  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dth:100%; max-width:218px; margin:8px auto 10px; cursor:pointer;\">\n        <image-slot id=\"fathersCoverPhoto\" style=\"display:block; width:100%; aspect-ratio:1/0.92; box-shadow:0 8px 20px rgba(80,90,110,.18);\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop your photo here\"><\u002Fimage-slot>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:1px; text-align:center; color:#46535e; font-size:clamp(15px,4.4vw,20px); line-height:1.4; padding:0 4px;\">\n        <sc-for list=\"{{ poemItems }}\" as=\"ln\" hint-placeholder-count=\"7\">\n          <div style=\"transition:opacity .7s ease, transform .7s ease; opacity:{{ ln.op }}; transform:translateY({{ ln.ty }});\">{{ ln.text }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showTurn }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ turn }}\" style=\"margin-top:14px; align-self:center; animation:softpulse 1.8s ease-in-out infinite; border:none; background:#2f7d9e; color:#fff; font-family:'Caveat',cursive; font-size:20px; padding:8px 24px; border-radius:999px; cursor:pointer; box-shadow:0 6px 16px rgba(47,125,158,.32);\">open the card ›<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== FACE 2 : PERSONAL NOTE ===== -->\n    <div style=\"position:absolute; inset:0; transform-origin:left center; backface-visibility:hidden; transition:transform 1.05s cubic-bezier(.62,.04,.2,1), opacity .5s ease .35s; transform:{{ face2T }}; opacity:{{ face2O }}; z-index:{{ face2Z }}; pointer-events:{{ face2PE }}; background:#fdfbf4; border-radius:13px; box-shadow:0 24px 54px rgba(70,90,110,.24), inset 0 0 0 1px rgba(0,0,0,.03); padding:24px 24px 20px; display:flex; flex-direction:column; overflow-y:auto; -webkit-overflow-scrolling:touch;\">\n      <div style=\"position:absolute; right:-34px; top:-34px; width:170px; height:170px; background:radial-gradient(closest-side, rgba(143,184,212,.4), transparent); filter:blur(8px); border-radius:50%; pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:absolute; left:-30px; bottom:-30px; width:150px; height:150px; background:radial-gradient(closest-side, rgba(207,154,95,.28), transparent); filter:blur(8px); border-radius:50%; pointer-events:none;\"><\u002Fdiv>\n      <image-slot id=\"fathersCoverPhoto\" style=\"display:block; flex:none; width:84px; height:84px; margin:0 auto 8px; box-shadow:0 6px 14px rgba(80,90,110,.2);\" shape=\"circle\" placeholder=\"Photo\"><\u002Fimage-slot>\n      <div style=\"font-family:'Amatic SC',cursive; font-weight:700; color:#2f7d9e; font-size:clamp(28px,7vw,40px); text-align:center; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;\">Happy Father's Day<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:9px; color:#46535e; font-size:clamp(15px,4.2vw,19px); line-height:1.45; padding-right:6px; text-wrap:pretty;\">\n        <sc-for list=\"{{ msgItems }}\" as=\"ln\" hint-placeholder-count=\"6\">\n          <div style=\"transition:opacity .8s ease, transform .8s ease; opacity:{{ ln.op }}; transform:translateY({{ ln.ty }});\">{{ ln.text }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showSig }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:16px; text-align:left; font-weight:600; font-size:clamp(21px,5.5vw,27px); color:#2f7d9e; line-height:1.15;\">Love,<br>{{ signatureName }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ ps }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:8px; text-align:center; font-size:clamp(14px,3.8vw,17px); color:#8a6f5a;\">{{ psText }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showSurprise }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:16px; display:flex; gap:12px; justify-content:center; align-items:center; padding-top:4px; flex-wrap:wrap;\">\n          <button onclick=\"{{ surprise }}\" style=\"border:1.5px solid #e6c4c4; background:rgba(255,250,250,.85); color:#c97b7b; font-family:'Caveat',cursive; font-size:18px; padding:7px 18px; border-radius:999px; cursor:pointer;\">a little surprise ♥<\u002Fbutton>\n          <button onclick=\"{{ restart }}\" style=\"border:1.5px solid #cfe0ea; background:rgba(255,255,255,.75); color:#2f7d9e; font-family:'Caveat',cursive; font-size:18px; padding:7px 18px; border-radius:999px; cursor:pointer;\">read again ↻<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- floating hearts -->\n    <div style=\"position:absolute; inset:0; pointer-events:none; z-index:60; overflow:visible;\">\n      <sc-for list=\"{{ hearts }}\" as=\"h\" hint-placeholder-count=\"0\">\n        <div style=\"position:absolute; bottom:20%; left:{{ h.left }}%; font-size:{{ h.size }}px; color:#d98a8a; text-shadow:0 1px 2px rgba(180,110,110,.3); animation:floatUp {{ h.dur }} ease-out {{ h.delay }} forwards;\">♥<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:720},&quot;senderName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Jonathan&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;enableSound&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;revealSpeed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;cozy&quot;,&quot;options&quot;:[&quot;slow&quot;,&quot;cozy&quot;,&quot;quick&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { stage: 0, revealed: 0, hearts: [], muted: false, ps: false };\n\n  poem = [\n    \"Today and every day,\",\n    \"I just want you to know\",\n    \"how much you mean to me.\",\n    \"You've been my guide, my protector,\",\n    \"and my biggest supporter.\",\n    \"Thank you for your endless love and wisdom \\u2014\",\n    \"I'm so lucky to have you as my dad.\"\n  ];\n\n  msg = [\n    \"Dad, I started preparing for this Father's Day looking for the perfect dad joke - something worthy of the kind of man you are but I couldn't find one.\",\n    \"It turned out that no joke captures someone who's hardworking, thoughtful, and wise; I'd say you're one in a million, but that's statistically unlikely.\",\n    \"But you are one of a kind, and you're my Dad.\",\n    \"I don't say it enough, but I see you. I see the effort, and I see you keep showing up for me.\"\n  ];\n\n  clouds = [\n    { top: \"10%\", size: 120, h: 54, dur: \"70s\", delay: \"-5s\", op: 0.85 },\n    { top: \"20%\", size: 80, h: 36, dur: \"95s\", delay: \"-45s\", op: 0.6 },\n    { top: \"5%\", size: 160, h: 70, dur: \"120s\", delay: \"-80s\", op: 0.5 },\n    { top: \"32%\", size: 95, h: 42, dur: \"85s\", delay: \"-30s\", op: 0.55 }\n  ];\n\n  leaves = [\n    { left: \"8%\", size: 13, hue: \"#9bb38a\", dur: \"14s\", delay: \"-2s\" },\n    { left: \"22%\", size: 10, hue: \"#d9b06a\", dur: \"18s\", delay: \"-9s\" },\n    { left: \"38%\", size: 15, hue: \"#88a878\", dur: \"16s\", delay: \"-5s\" },\n    { left: \"55%\", size: 11, hue: \"#c9a45f\", dur: \"20s\", delay: \"-13s\" },\n    { left: \"68%\", size: 14, hue: \"#9bb38a\", dur: \"15s\", delay: \"-7s\" },\n    { left: \"80%\", size: 9, hue: \"#d9b06a\", dur: \"19s\", delay: \"-3s\" },\n    { left: \"90%\", size: 12, hue: \"#88a878\", dur: \"17s\", delay: \"-11s\" },\n    { left: \"47%\", size: 9, hue: \"#c9a45f\", dur: \"22s\", delay: \"-16s\" },\n    { left: \"3%\", size: 11, hue: \"#88a878\", dur: \"21s\", delay: \"-12s\" },\n    { left: \"14%\", size: 16, hue: \"#c9a45f\", dur: \"17s\", delay: \"-6s\" },\n    { left: \"30%\", size: 8, hue: \"#9bb38a\", dur: \"23s\", delay: \"-1s\" },\n    { left: \"44%\", size: 13, hue: \"#d9b06a\", dur: \"15s\", delay: \"-10s\" },\n    { left: \"60%\", size: 10, hue: \"#88a878\", dur: \"19s\", delay: \"-4s\" },\n    { left: \"74%\", size: 15, hue: \"#c9a45f\", dur: \"16s\", delay: \"-14s\" },\n    { left: \"85%\", size: 12, hue: \"#9bb38a\", dur: \"20s\", delay: \"-8s\" },\n    { left: \"95%\", size: 9, hue: \"#d9b06a\", dur: \"18s\", delay: \"-2s\" },\n    { left: \"63%\", size: 13, hue: \"#88a878\", dur: \"24s\", delay: \"-19s\" },\n    { left: \"18%\", size: 10, hue: \"#c9a45f\", dur: \"22s\", delay: \"-15s\" },\n    { left: \"51%\", size: 14, hue: \"#9bb38a\", dur: \"17s\", delay: \"-7s\" }\n  ];\n\n  componentWillUnmount() { clearInterval(this._iv); this.stopAudio(); }\n\n  gapFor() {\n    const m = { slow: 1.5, cozy: 1.0, quick: 0.6 };\n    return (m[this.props.revealSpeed] || 1.0) * 1000;\n  }\n\n  startReveal(total) {\n    clearInterval(this._iv);\n    this.setState({ revealed: 0 });\n    let n = 0;\n    this._iv = setInterval(() => {\n      n++;\n      this.setState({ revealed: n });\n      if (n >= total) clearInterval(this._iv);\n    }, this.gapFor());\n  }\n\n  advance(to) {\n    this.setState({ stage: to, revealed: 0, ps: false });\n    if (to === 1) this.startReveal(this.poem.length);\n    if (to === 2) this.startReveal(this.msg.length);\n    this.resume();\n  }\n\n  open() {\n    if (this.props.enableSound ?? true) this.initAudio();\n    this.advance(1);\n  }\n\n  restart() {\n    clearInterval(this._iv);\n    this.setState({ stage: 0, revealed: 0, ps: false, hearts: [] });\n  }\n\n  surprise() {\n    this.setState({ ps: true });\n    this.spawnHearts(16);\n  }\n\n  spawnHearts(count) {\n    const add = [];\n    for (let i = 0; i < count; i++) {\n      const id = (this._hid = (this._hid || 0) + 1);\n      add.push({\n        id,\n        left: (18 + Math.random() * 64).toFixed(1),\n        size: (15 + Math.random() * 22).toFixed(0),\n        dur: (2 + Math.random() * 1.3).toFixed(2) + \"s\",\n        delay: (Math.random() * 0.45).toFixed(2) + \"s\"\n      });\n    }\n    this.setState(s => ({ hearts: s.hearts.concat(add) }));\n    const ids = add.map(a => a.id);\n    setTimeout(() => this.setState(s => ({ hearts: s.hearts.filter(h => ids.indexOf(h.id) === -1) })), 3700);\n    this.chime();\n  }\n\n  /* ---------- warm ambient lullaby ---------- */\n  // gentle I–vi–IV–V progression in C, voiced low and warm\n  chords = [\n    [130.81, 164.81, 196.00, 246.94], // Cmaj7\n    [110.00, 164.81, 196.00, 261.63], // Am7\n    [174.61, 220.00, 261.63, 329.63], // Fmaj7\n    [196.00, 246.94, 293.66, 349.23]  // G\n  ];\n  // C major pentatonic bells, mid register so they sing rather than ping\n  bellScale = [392.00, 440.00, 523.25, 587.33, 659.25, 783.99];\n\n  initAudio() {\n    if (this._actx) { this.resume(); return; }\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      const ctx = new AC();\n      this._actx = ctx;\n\n      const master = ctx.createGain();\n      master.gain.value = this.state.muted ? 0 : 0.2;\n      master.connect(ctx.destination);\n      this._master = master;\n\n      // gentle \"reverb\": damped feedback delay — adds air around the bells\n      const wet = ctx.createGain(); wet.gain.value = 0.28; wet.connect(master);\n      const delay = ctx.createDelay(1.0); delay.delayTime.value = 0.3;\n      const fb = ctx.createGain(); fb.gain.value = 0.32;\n      const damp = ctx.createBiquadFilter(); damp.type = \"lowpass\"; damp.frequency.value = 1800;\n      delay.connect(damp); damp.connect(fb); fb.connect(delay); damp.connect(wet);\n      this._reverbIn = delay;\n\n      // soft flowing-stream bed: looping filtered noise, kept low under the bells\n      this.startStream(ctx, master);\n\n      this.scheduleBell();\n    } catch (e) {}\n  }\n\n  startStream(ctx, master) {\n    // 4s of white noise, looped\n    const len = ctx.sampleRate * 4;\n    const buf = ctx.createBuffer(1, len, ctx.sampleRate);\n    const d = buf.getChannelData(0);\n    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;\n    const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;\n\n    const streamBus = ctx.createGain(); streamBus.gain.value = 0; streamBus.connect(master);\n\n    // low rushing body\n    const lp = ctx.createBiquadFilter(); lp.type = \"lowpass\"; lp.frequency.value = 620; lp.Q.value = 0.7;\n    const bodyG = ctx.createGain(); bodyG.gain.value = 0.5;\n    src.connect(lp); lp.connect(bodyG); bodyG.connect(streamBus);\n\n    // higher trickle/burble, quieter\n    const bp = ctx.createBiquadFilter(); bp.type = \"bandpass\"; bp.frequency.value = 2200; bp.Q.value = 0.9;\n    const trickleG = ctx.createGain(); trickleG.gain.value = 0.18;\n    src.connect(bp); bp.connect(trickleG); trickleG.connect(streamBus);\n\n    src.start();\n    streamBus.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 5); // fade in, low\n\n    // slow movement so it never sits still / sounds like a loop\n    const lfo1 = ctx.createOscillator(); lfo1.frequency.value = 0.07;\n    const lg1 = ctx.createGain(); lg1.gain.value = 180;\n    lfo1.connect(lg1); lg1.connect(lp.frequency); lfo1.start();\n\n    const lfo2 = ctx.createOscillator(); lfo2.frequency.value = 0.13;\n    const lg2 = ctx.createGain(); lg2.gain.value = 600;\n    lfo2.connect(lg2); lg2.connect(bp.frequency); lfo2.start();\n\n    // gentle burble in the trickle level\n    const lfo3 = ctx.createOscillator(); lfo3.frequency.value = 0.31;\n    const lg3 = ctx.createGain(); lg3.gain.value = 0.09;\n    lfo3.connect(lg3); lg3.connect(trickleG.gain); lfo3.start();\n\n    this._stream = src;\n    this._extra = [lfo1, lfo2, lfo3];\n  }\n\n  scheduleBell() {\n    this._bellT = setTimeout(() => { this.bell(); this.scheduleBell(); }, 3000 + Math.random() * 3200);\n  }\n\n  // soft bell tied to the current chord so melody stays consonant\n  bell(freq) {\n    const ctx = this._actx;\n    if (!ctx || !this._master) return;\n    try {\n      const fr = freq || this.bellScale[Math.floor(Math.random() * this.bellScale.length)];\n      const t = ctx.currentTime;\n      const g = ctx.createGain(); g.gain.value = 0;\n      g.connect(this._master);\n      if (this._reverbIn) g.connect(this._reverbIn);\n      // pure sine fundamental + a quiet octave for body (no bright harmonics = not tinny)\n      const o1 = ctx.createOscillator(); o1.type = \"sine\"; o1.frequency.value = fr; o1.connect(g);\n      const o2 = ctx.createOscillator(); o2.type = \"sine\"; o2.frequency.value = fr * 2;\n      const g2 = ctx.createGain(); g2.gain.value = 0.22; o2.connect(g2); g2.connect(g);\n      g.gain.setValueAtTime(0, t);\n      g.gain.linearRampToValueAtTime(0.1, t + 0.05);   // soft attack\n      g.gain.exponentialRampToValueAtTime(0.0001, t + 2.8); // long, gentle tail\n      o1.start(t); o2.start(t); o1.stop(t + 2.9); o2.stop(t + 2.9);\n    } catch (e) {}\n  }\n\n  // little sparkle for the heart interaction — two soft bells\n  chime() {\n    const top = this.bellScale[this.bellScale.length - 2];\n    this.bell(top);\n    setTimeout(() => this.bell(top * 1.5), 140);\n  }\n\n  toggleMute() {\n    const m = !this.state.muted;\n    this.setState({ muted: m });\n    if (!this._actx) { this.initAudio(); return; }\n    this.resume();\n    if (this._master) this._master.gain.linearRampToValueAtTime(m ? 0 : 0.14, this._actx.currentTime + 0.3);\n  }\n\n  resume() { try { if (this._actx && this._actx.state === \"suspended\") this._actx.resume(); } catch (e) {} }\n  stopAudio() {\n    try {\n      clearTimeout(this._chordT); clearTimeout(this._bellT);\n      (this._voices || []).forEach(v => { v.a.stop(); v.b.stop(); });\n      (this._extra || []).forEach(o => o.stop());\n      this._stream && this._stream.stop();\n      this._actx && this._actx.close();\n    } catch (e) {}\n  }\n\n  renderVals() {\n    const s = this.state;\n    const stage = s.stage, rev = s.revealed;\n    const name = this.props.senderName ?? \"Jonathan\";\n    const ft = i => (i < stage ? \"rotateY(-172deg)\" : \"rotateY(0deg)\");\n    const fo = i => (i < stage ? \"0\" : \"1\");\n    const fz = i => String(i < stage ? 0 : 50 - i);\n    const pe = i => (i === stage ? \"auto\" : \"none\");\n    const poemItems = this.poem.map((t, i) => ({ text: t, op: (stage >= 1 && i < rev) ? \"1\" : \"0\", ty: (stage >= 1 && i < rev) ? \"0px\" : \"16px\" }));\n    const msgItems = this.msg.map((t, i) => ({ text: t, op: (stage >= 2 && i < rev) ? \"1\" : \"0\", ty: (stage >= 2 && i < rev) ? \"0px\" : \"16px\" }));\n    const poemDone = stage >= 1 && rev >= this.poem.length;\n    const msgDone = stage >= 2 && rev >= this.msg.length;\n\n    return {\n      clouds: this.clouds,\n      leaves: this.leaves,\n      face0T: ft(0), face1T: ft(1), face2T: ft(2),\n      face0O: fo(0), face1O: fo(1), face2O: fo(2),\n      face0Z: fz(0), face1Z: fz(1), face2Z: fz(2),\n      face0PE: pe(0), face1PE: pe(1), face2PE: pe(2),\n      poemItems, msgItems,\n      showTurn: stage === 1 && poemDone,\n      showSig: msgDone,\n      showSurprise: stage === 2 && msgDone,\n      ps: s.ps,\n      psText: \"P.S. \\u2014 Turns out you are one in a million after all.\",\n      signatureName: name,\n      hearts: s.hearts,\n      soundOn: (this.props.enableSound ?? true),\n      muteLabel: s.muted ? \"\\u266a music off\" : \"\\u266a music on\",\n      stopTap: (e) => { e.stopPropagation(); },\n      open: () => this.open(),\n      turn: () => this.advance(2),\n      pop: () => this.spawnHearts(6),\n      surprise: () => this.surprise(),\n      toggleMute: () => this.toggleMute(),\n      restart: () => this.restart()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
